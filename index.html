<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>CarJet price check</title>
<!-- Telegram Mini App SDK (official, public) -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0e1621; --panel:#16202b; --panel2:#1b2733; --txt:#e9eff5; --muted:#8194a3;
    --line:#283643; --accent:#2ea6ff; --green:#21c45d; --greenbg:rgba(33,196,93,.12);
    --small:#3b9eff; --medium:#28c46a; --large:#f0a52b; --suv:#a86cf0;
    --estate:#16bfa6; --premium:#ef5350; --cabrio:#e06bb0; --van:#7a8a99;
    color-scheme:dark;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,sans-serif}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt)}
  body{padding:16px 14px 26px}

  h1{font-size:17px;margin:0 0 3px;font-weight:700;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12px;margin:0 0 14px;line-height:1.5}

  /* PDF-style header (read-only, confirms the request) */
  .header{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px}
  .header.green{background:var(--greenbg);border-color:var(--green)}
  .hd-top{font-size:10.5px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;
          display:flex;justify-content:space-between;align-items:center}
  .hd-top .stat{color:var(--green);font-weight:700}
  .hd-main{font-size:16px;font-weight:700;margin-top:5px;letter-spacing:.2px}
  .hd-sub{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.45}
  .hd-lock{font-size:11px;color:var(--green);margin-top:8px;font-weight:600;letter-spacing:.3px;
           border-top:1px solid rgba(33,196,93,.25);padding-top:7px}

  .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;
         margin:16px 2px 9px;font-weight:700}

  .row{display:flex;flex-wrap:wrap;gap:7px}

  .chip{padding:9px 13px;border-radius:7px;border:1.5px solid var(--line);background:transparent;
        color:var(--txt);font-size:12.5px;cursor:pointer;font-weight:600;letter-spacing:.2px;
        transition:.12s;-webkit-appearance:none}
  .chip.on{color:#03121f;border-color:transparent}
  .chip[disabled]{opacity:1;cursor:default}

  .confirmRow{display:flex;gap:8px;margin-top:14px}
  .btn{flex:1;padding:11px;border-radius:8px;border:none;font-size:12.5px;font-weight:700;
       cursor:pointer;letter-spacing:.4px;text-transform:uppercase}
  .btn.go,.btn.check{background:var(--green);color:#03210f}
  .btn.ignore{background:#243039;color:var(--muted)}

  .note{padding:11px 13px;color:var(--muted);font-size:12px;border:1px dashed var(--line);
        border-radius:7px;width:100%}

  /* ── MATRIX BUILDER ── */
  .seg{display:flex;gap:7px}
  .seg .chip{flex:1;text-align:center}
  .cal{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 10px 12px}
  .cal-hd{display:flex;align-items:center;justify-content:space-between;margin:2px 4px 9px}
  .cal-hd .mlabel{font-size:13.5px;font-weight:700}
  .cal-nav{width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);
           color:var(--txt);font-size:15px;cursor:pointer}
  .cal-nav[disabled]{opacity:.3;cursor:default}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-dow{text-align:center;color:var(--muted);font-size:9.5px;font-weight:700;padding:2px 0;text-transform:uppercase}
  .cal-day{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;border-radius:7px;
           font-size:12.5px;cursor:pointer;color:var(--txt);background:transparent;border:1px solid transparent}
  .cal-day.blank{cursor:default}
  .cal-day.off{color:#3a4754;cursor:default}
  .cal-day.inrange{background:rgba(46,166,255,.16)}
  .cal-day.end1,.cal-day.end2{background:var(--accent);color:#03121f;font-weight:800}
  .selrow{display:flex;justify-content:space-between;color:var(--muted);font-size:11.5px;margin:9px 2px 0}
  .selrow b{color:var(--txt)}
  .tworow{display:flex;gap:10px}
  .tcell{flex:1}
  .tcell label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:0 2px 5px;font-weight:700}
  select{width:100%;padding:9px 10px;border-radius:7px;border:1.5px solid var(--line);background:var(--panel2);
         color:var(--txt);font-size:13px;-webkit-appearance:none;font-weight:600}
  .count{margin-top:14px;padding:11px 13px;border-radius:8px;border:1px solid var(--line);
         background:var(--panel);font-size:12.5px;line-height:1.5}
  .count.ok{border-color:var(--green)} .count.bad{border-color:var(--premium)}
  .count b{color:var(--txt)} .count .big{font-size:15px;font-weight:800}
  .count.ok .big{color:var(--green)} .count.bad .big{color:var(--premium)}
</style>
</head>
<body>
  <h1>CarJet price check</h1>
  <p class="sub" id="sub">Confirming your request…</p>

  <!-- PDF-style header card (read-only) -->
  <div class="header" id="hdr">
    <div class="hd-top"><span id="hdLive">live</span><span class="stat" id="hdStat">ZTH · CarJet</span></div>
    <div class="hd-main" id="hdMain">—</div>
    <div class="hd-sub" id="hdSub">—</div>
    <div class="hd-lock" id="hdLock" style="display:none"></div>
  </div>

  <!-- Stage body — populated per request type -->
  <div id="stage"></div>

<script>
  var tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  // ── request facts from the URL (the bot built this) ──────────────────────────
  var Q = new URLSearchParams(location.search);
  var TYPE    = (Q.get("t") || "single").toLowerCase();   // single | today | multi
  var STATION = (Q.get("st") || "ZTH02").toUpperCase();
  var CI      = Q.get("ci") || "";
  var CO      = Q.get("co") || "";
  var DAYS    = parseInt(Q.get("d") || "1", 10);
  var PRESIZE = (Q.get("g") || "").toLowerCase();          // optional pre-ticked column
  var TRANS   = Q.get("tr") || "";
  var ALLG    = Q.get("all") === "1";
  var PICKUP  = Q.get("pk") || "";                         // single = 10:00; today chosen in-app

  // ── per-station broker base + extras ─────────────────────────────────────────
  // The base (always running) is CarJet for ZTH, rentalcars for EFL. Optional extras are the
  // other three. CarJet is never a single/today button — it is the base.
  var IS_EFL = STATION.indexOf("EFL") === 0;
  var BASE   = IS_EFL ? {code:"rc", label:"rentalcars"} : {code:"cj", label:"CarJet"};
  var EXTRAS = IS_EFL
    ? [{code:"cj",label:"CarJet"},{code:"dc",label:"Discover"},{code:"ct",label:"CTrawler"}]
    : [{code:"dc",label:"Discover"},{code:"ct",label:"CTrawler"},{code:"rc",label:"RentalCars"}];

  var SIZES = ["Small","Medium","Large","SUV","Estate","Premium","Cabrio","Van"];
  var SIZE_VAR = {Small:"--small",Medium:"--medium",Large:"--large",SUV:"--suv",
                  Estate:"--estate",Premium:"--premium",Cabrio:"--cabrio",
                  Van:"--van","Van 7":"--van","Van 9":"--van"};
  // Station-aware column list. ZTH = CarJet, which gives the 7/9 people-carrier seat split
  // (classify_live) → Van 7 + Van 9 as distinct columns. EFL = rentalcars, one generic 'Van'
  // (no seat number) → keep the single Van. Used by BOTH the matrix builder and the multi card.
  function groupSizes(){
    return IS_EFL ? SIZES
                  : ["Small","Medium","Large","SUV","Estate","Premium","Cabrio","Van 7","Van 9"];
  }
  var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // ── selection state ──────────────────────────────────────────────────────────
  var brk = {};                 // chosen extra broker codes
  var sel = {};                 // chosen sizes (multi columns)
  var pickup = PICKUP || null;  // today: chosen in-app

  function pad2(n){ return (n<10?"0":"")+n; }
  function fmtIso(iso){
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso||"");
    if(!m) return iso||"—";
    return parseInt(m[3],10) + " " + MONTHS[parseInt(m[2],10)-1];
  }
  function athensClock(){
    return new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/Athens",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date());
  }
  function athensHour(){
    var s = new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/Athens",hour:"2-digit",hour12:false}).format(new Date());
    var h = parseInt(s,10); if (h===24) h=0; return h;
  }

  // ── read-only header ─────────────────────────────────────────────────────────
  function renderHeader(){
    document.getElementById("hdStat").textContent = IS_EFL ? "EFL · rentalcars" : "ZTH · CarJet";
    document.getElementById("hdLive").textContent = "live · " + athensClock();
    var loc = STATION.slice(0,3);
    if (TYPE === "matrix"){
      document.getElementById("hdMain").textContent = loc + "  matrix builder";
      document.getElementById("hdSub").textContent  = "compose the full sweep below, then GO";
    } else if (TYPE === "multi"){
      document.getElementById("hdMain").textContent = loc + "  " + DAYS + "-day matrix";
      document.getElementById("hdSub").textContent  = "from " + fmtIso(CI) + " · pickup 10:00 · " + DAYS + (DAYS===1?" day":" days");
    } else if (TYPE === "today"){
      document.getElementById("hdMain").textContent = loc + "  today  ·  7 days";
      document.getElementById("hdSub").textContent  = pickup ? ("pickup " + pickup + " · scraping") : "pick a pickup time";
    } else {
      document.getElementById("hdMain").textContent = loc + "  " + fmtIso(CI) + " → " + fmtIso(CO) + "  ·  7 days";
      document.getElementById("hdSub").textContent  = "pickup " + (PICKUP||"10:00") + " · scraping now";
    }
  }
  function lockHeader(text){
    var h = document.getElementById("hdr"); h.classList.add("green");
    var l = document.getElementById("hdLock");
    if (text){ l.style.display = "block"; l.textContent = text; }
    document.getElementById("hdStat").textContent = "LOCKED";
  }

  // ── broker chips (extras; the base is always-on, shown disabled) ──────────────
  function brokerChipsHtml(){
    var html = '<button class="chip on" disabled style="background:var(--accent)">'
             + BASE.label + ' · base</button>';
    EXTRAS.forEach(function(b){
      html += '<button class="chip" data-brk="'+b.code+'">'+b.label+'</button>';
    });
    return html;
  }
  function wireBrokerChips(box){
    box.addEventListener("click", function(e){
      var b = e.target.closest("button[data-brk]"); if(!b) return;
      var code = b.getAttribute("data-brk");
      if (brk[code]){ delete brk[code]; b.classList.remove("on"); b.style.background=""; }
      else { brk[code] = true; b.classList.add("on"); b.style.background = "var(--accent)"; }
      update();
    });
  }
  function chosenBrokers(){ return EXTRAS.map(function(b){return b.code;}).filter(function(c){return brk[c];}); }

  // ── size chips (multi only = matrix columns) ─────────────────────────────────
  function sizeChipsHtml(){
    return groupSizes().map(function(s){
      var on = PRESIZE && s.toLowerCase() === PRESIZE;
      if (on) sel[s] = true;
      return '<button class="chip'+(on?' on':'')+'" data-size="'+s+'"'
           + (on?(' style="background:var('+SIZE_VAR[s]+')"'):'')+'>'+s+'</button>';
    }).join("");
  }
  function wireSizeChips(box){
    box.addEventListener("click", function(e){
      var b = e.target.closest("button[data-size]"); if(!b) return;
      var s = b.getAttribute("data-size");
      if (sel[s]){ delete sel[s]; b.classList.remove("on"); b.style.background=""; }
      else { sel[s] = true; b.classList.add("on"); b.style.background = "var("+SIZE_VAR[s]+")"; }
      update();
    });
  }
  function chosenSizes(){ return groupSizes().filter(function(s){return sel[s];}); }

  // ── send + close ─────────────────────────────────────────────────────────────
  function send(extra){
    var base = { v:2, t:TYPE, st:STATION, ci:CI, co:CO, lang:(Q.get("lang")||"en"),
                 brokers: chosenBrokers() };
    if (ALLG) base.all = true;
    if (PRESIZE) base.g = PRESIZE;
    if (TRANS) base.tr = TRANS;
    var payload = Object.assign(base, extra || {});
    tg.sendData(JSON.stringify(payload));
    tg.close();
  }

  // ── flows ──────────────────────────────────────────────────────────────────
  var stage = document.getElementById("stage");
  var update = function(){};   // re-bound per flow

  function flowSingle(){
    document.getElementById("sub").textContent = "Scraping " + BASE.label + " now. Add brokers, then GO (or just close).";
    stage.innerHTML =
      '<div class="label">Add brokers (optional)</div>' +
      '<div class="row" id="brokers">' + brokerChipsHtml() + '</div>';
    wireBrokerChips(document.getElementById("brokers"));
    update = function(){
      var n = chosenBrokers().length;
      if (n){ tg.MainButton.setText("GO · +" + n + (n===1?" broker":" brokers")); tg.MainButton.enable(); }
      else  { tg.MainButton.setText("DONE · CarJet only"); tg.MainButton.enable(); }
    };
    tg.MainButton.onClick(function(){ send({ pk: PICKUP || "10:00" }); });
    tg.MainButton.show(); update();
  }

  function flowToday(){
    document.getElementById("sub").textContent = "Today needs a pickup time — pick one, add brokers, then GO.";
    var nextHour = athensHour() + 1;
    var times = "";
    if (nextHour > 23){
      times = '<div class="note">No pickup times left today — try again tomorrow.</div>';
    } else {
      for (var h = nextHour; h <= 23; h++){ times += '<button class="chip" data-time="'+pad2(h)+':00">'+pad2(h)+':00</button>'; }
    }
    stage.innerHTML =
      '<div class="label">Pickup time (today)</div>' +
      '<div class="row" id="times">' + times + '</div>' +
      '<div id="afterTime"></div>';

    var timesBox = document.getElementById("times");
    timesBox.addEventListener("click", function(e){
      var t = e.target.closest("button[data-time]"); if(!t) return;
      [].forEach.call(timesBox.querySelectorAll("button"), function(x){ x.classList.remove("on"); x.style.background=""; });
      t.classList.add("on"); t.style.background = "var(--accent)";
      pickup = t.getAttribute("data-time");
      renderHeader();
      // reveal brokers once a time is picked
      document.getElementById("afterTime").innerHTML =
        '<div class="label">Add brokers (optional)</div>' +
        '<div class="row" id="brokers">' + brokerChipsHtml() + '</div>';
      wireBrokerChips(document.getElementById("brokers"));
      update();
    });

    update = function(){
      if (!pickup){ tg.MainButton.setText("PICK A PICKUP TIME"); tg.MainButton.disable(); return; }
      var n = chosenBrokers().length;
      tg.MainButton.setText("GO · " + pickup + (n?(" · +"+n):"")); tg.MainButton.enable();
    };
    tg.MainButton.onClick(function(){ if(!pickup) return; send({ pk: pickup }); });
    tg.MainButton.show(); update();
  }

  function flowMulti(){
    document.getElementById("sub").textContent = "Multi-day grid. Confirm dates → add brokers → pick sizes → GO.";
    // step 1 — confirm dates
    stage.innerHTML =
      '<div class="label">Confirm these dates</div>' +
      '<div class="confirmRow">' +
        '<button class="btn check" id="mConfirm">Confirm</button>' +
        '<button class="btn ignore" id="mSkip">Skip</button>' +
      '</div>';
    tg.MainButton.hide();
    document.getElementById("mSkip").addEventListener("click", function(){ tg.close(); });
    document.getElementById("mConfirm").addEventListener("click", multiStepBrokers);
  }
  function multiStepBrokers(){
    lockHeader("dates locked");
    stage.innerHTML =
      '<div class="label">Add brokers (optional)</div>' +
      '<div class="row" id="brokers">' + brokerChipsHtml() + '</div>' +
      '<div class="confirmRow"><button class="btn check" id="mCheck">Check → pick sizes</button></div>';
    wireBrokerChips(document.getElementById("brokers"));
    document.getElementById("mCheck").addEventListener("click", multiStepSizes);
  }
  function multiStepSizes(){
    var bro = chosenBrokers();
    lockHeader("dates locked" + (bro.length ? "  |  brokers: " + bro.join(" · ") : ""));
    stage.innerHTML =
      '<div class="label">Select car sizes (matrix columns)</div>' +
      '<div class="row" id="sizes">' + sizeChipsHtml() + '</div>';
    wireSizeChips(document.getElementById("sizes"));
    update = function(){
      var n = chosenSizes().length;
      if (n){ tg.MainButton.setText("GO · " + n + (n===1?" column":" columns")); tg.MainButton.enable(); }
      else  { tg.MainButton.setText("PICK AT LEAST ONE SIZE"); tg.MainButton.disable(); }
    };
    tg.MainButton.onClick(function(){
      var sizes = chosenSizes(); if (!sizes.length) return;
      send({ d: DAYS, sizes: sizes.map(function(s){return s.toLowerCase();}), pk: "10:00" });
    });
    tg.MainButton.setParams({ color:"#21c45d", text_color:"#03210f" });
    tg.MainButton.show(); update();
  }

  // ── MATRIX BUILDER ─────────────────────────────────────────────────────────
  // The app composes the WHOLE request: station · pickup-day RANGE · pickup time ·
  // rental LENGTHS (multi) · brokers (multi) · car groups (multi). Live N = P×r×B counter; GO
  // confirms the count and blocks > 100. Sends {v:3,t:'matrix',...} back to the bot (web_app_data
  // → planMatrix → matrix_scrape.py serial sweep). PDF render is the placeholder (being redesigned).
  var MX = {
    station: (STATION.indexOf("EFL") === 0) ? "EFL02" : "ZTH02",
    start: null, end: null,                      // pickup-day range (ISO)
    pk: "10:00",                                 // drop-off = pickup (hard rule, enforced by scrapers)
    lengths: {},                                 // {N:true}
    brk: {},                                     // chosen broker codes (FLAT set; primary = first by priority)
    grp: {},                                     // chosen sizes (columns)
    view: null,                                  // {y,m} month shown
  };
  var CAP = 100;
  var DOW = ["Mo","Tu","We","Th","Fr","Sa","Su"];

  // FLAT broker multiselect (2026-07-04): every station broker is toggleable — CarJet is no
  // longer a forced base. List order = primary-priority: the FIRST selected (top-down) is the
  // render/primary broker on the backend; the rest are DB-only extras. ≥1 must stay selected
  // (submit is blocked at zero). ZTH leads with CarJet, EFL with rentalcars (each station's
  // renderable default) so the out-of-the-box selection matches the old base-only behaviour.
  function mxAllBrokers(){ return MX.station.indexOf("EFL") === 0
      ? [{code:"rc",label:"rentalcars"},{code:"cj",label:"CarJet"},{code:"dc",label:"Discover"},{code:"ct",label:"CTrawler"}]
      : [{code:"cj",label:"CarJet"},{code:"rc",label:"rentalcars"},{code:"dc",label:"Discover"},{code:"ct",label:"CTrawler"}]; }
  function mxPrimaryCode(){ return mxAllBrokers()[0].code; }
  function mxSelectedCodes(){ return mxAllBrokers().map(function(b){return b.code;})
      .filter(function(c){return MX.brk[c];}); }

  function athTodayIso(){
    return new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Athens",
      year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
  }
  function isoOf(y,m,d){ return y+"-"+pad2(m)+"-"+pad2(d); }
  function dim(y,m){ return new Date(y,m,0).getDate(); }            // m 1-based → days in month
  function dowMon(y,m,d){ return (new Date(y,m-1,d).getDay()+6)%7; } // 0=Mon
  function daysBetween(a,b){
    return Math.round((new Date(b+"T12:00:00Z")-new Date(a+"T12:00:00Z"))/86400000)+1;
  }
  function pickupDays(){
    if (!MX.start) return 0;
    return Math.max(0, daysBetween(MX.start, MX.end || MX.start));
  }
  function nLengths(){ return Object.keys(MX.lengths).length; }
  function nBrokers(){ return mxSelectedCodes().length; }           // flat count (≥1 to submit)
  function totalScrapes(){ return pickupDays()*nLengths()*nBrokers(); }
  function baseWindows(){ return pickupDays()*nLengths(); }
  function etaMin(){ return Math.max(1, Math.round((baseWindows()*10 + baseWindows()*(nBrokers()-1)*12)/60)); }

  function flowMatrix(){
    document.getElementById("sub").textContent =
      "Pick a station, a pickup-day range, times, rental lengths, brokers and car groups.";
    var t = athTodayIso(); MX.view = { y:+t.slice(0,4), m:+t.slice(5,7) };

    var times = "";
    for (var h=0; h<24; h++){ var v=pad2(h)+":00"; times += '<option value="'+v+'">'+v+'</option>'; }
    var lenChips = "";
    for (var L=1; L<=15; L++){ lenChips += '<button class="chip" data-len="'+L+'">'+L+'</button>'; }

    stage.innerHTML =
      '<div class="label">Station</div>' +
      '<div class="seg" id="mxSt">' +
        '<button class="chip" data-st="ZTH02">ZTH</button>' +
        '<button class="chip" data-st="EFL02">EFL</button></div>' +
      '<div class="label">Pickup-day range</div>' +
      '<div class="cal" id="mxCal"></div>' +
      '<div class="selrow"><span>Start: <b id="mxStart">—</b></span><span>End: <b id="mxEnd">—</b></span></div>' +
      '<div class="label">Pickup time</div>' +
      '<div class="tworow">' +
        '<div class="tcell"><label>Pickup</label><select id="mxPk">'+times+'</select></div></div>' +
      '<div class="label">Rental length (days) — pick one or more</div>' +
      '<div class="row" id="mxLen">'+lenChips+'</div>' +
      '<div class="label">Brokers</div>' +
      '<div class="row" id="mxBrk"></div>' +
      '<div class="label">Car groups (matrix columns)</div>' +
      '<div class="row" id="mxGrp"></div>' +
      '<div class="count" id="mxCount"></div>';

    document.getElementById("mxSt").addEventListener("click", function(e){
      var b = e.target.closest("button[data-st]"); if(!b) return;
      MX.station = b.getAttribute("data-st");
      STATION = MX.station; IS_EFL = MX.station.indexOf("EFL")===0;
      paintStation(); renderBrokers(true); renderGroups(); renderHeader(); mxUpdate();
    });
    document.getElementById("mxPk").value = MX.pk;
    document.getElementById("mxPk").addEventListener("change", function(e){ MX.pk=e.target.value; mxUpdate(); });
    document.getElementById("mxLen").addEventListener("click", function(e){
      var b = e.target.closest("button[data-len]"); if(!b) return;
      var L = b.getAttribute("data-len");
      if (MX.lengths[L]){ delete MX.lengths[L]; b.classList.remove("on"); b.style.background=""; }
      else { MX.lengths[L]=true; b.classList.add("on"); b.style.background="var(--accent)"; }
      mxUpdate();
    });
    renderGroups();   // station-aware chips (re-rendered on station flip); listener is delegated
    document.getElementById("mxGrp").addEventListener("click", function(e){
      var b = e.target.closest("button[data-grp]"); if(!b) return;
      var s = b.getAttribute("data-grp");
      if (MX.grp[s]){ delete MX.grp[s]; b.classList.remove("on"); b.style.background=""; }
      else { MX.grp[s]=true; b.classList.add("on"); b.style.background="var("+SIZE_VAR[s]+")"; }
      mxUpdate();
    });

    paintStation(); renderBrokers(true); renderCal();
    tg.MainButton.onClick(mxGo); tg.MainButton.show(); mxUpdate();
  }

  function paintStation(){
    [].forEach.call(document.querySelectorAll("#mxSt button"), function(b){
      var on = b.getAttribute("data-st")===MX.station;
      b.classList.toggle("on", on);
      b.style.background = on ? "var(--accent)" : "";
    });
  }
  // Station-aware matrix-column chips. Prunes any ticked size not valid for the current
  // station (so flipping ZTH→EFL drops Van 7/Van 9, EFL→ZTH drops generic Van), then redraws
  // with the surviving on-state. The click handler on #mxGrp is delegated, so it survives this.
  function renderGroups(){
    var gs = groupSizes();
    Object.keys(MX.grp).forEach(function(s){ if (gs.indexOf(s) < 0) delete MX.grp[s]; });
    document.getElementById("mxGrp").innerHTML = gs.map(function(s){
      var on = MX.grp[s];
      return '<button class="chip'+(on?' on':'')+'" data-grp="'+s+'"'
           + (on?(' style="background:var('+SIZE_VAR[s]+')"'):'')+'>'+s+'</button>';
    }).join("");
  }
  // ensureDefault=true (initial render + station flip) selects the station primary when nothing
  // is ticked, so a fresh matrix always starts valid. A user TOGGLE re-renders with ensureDefault
  // =false, so the owner CAN clear it to zero — the GO button then blocks submit (see mxUpdate).
  function renderBrokers(ensureDefault){
    var all = mxAllBrokers();
    var valid = {}; all.forEach(function(b){ valid[b.code]=true; });
    Object.keys(MX.brk).forEach(function(c){ if(!valid[c]) delete MX.brk[c]; });   // prune on station flip
    if (ensureDefault && !mxSelectedCodes().length) MX.brk[mxPrimaryCode()] = true;
    var prim = mxSelectedCodes()[0];                                               // primary = first selected
    var html = all.map(function(b){
      var on = MX.brk[b.code];
      var tag = (on && b.code === prim) ? " · base" : "";
      return '<button class="chip'+(on?' on':'')+'" data-brk="'+b.code+'"'+
             (on?' style="background:var(--accent)"':'')+'>'+b.label+tag+'</button>';
    }).join("");
    var box = document.getElementById("mxBrk"); box.innerHTML = html;
    box.onclick = function(e){
      var b = e.target.closest("button[data-brk]"); if(!b) return;
      var c = b.getAttribute("data-brk");
      if (MX.brk[c]) delete MX.brk[c]; else MX.brk[c] = true;
      renderBrokers(false);     // re-render so the "· base" primary tag follows the new selection
      mxUpdate();
    };
  }
  function renderCal(){
    var y=MX.view.y, m=MX.view.m, today=athTodayIso();
    var head =
      '<div class="cal-hd">'+
        '<button class="cal-nav" id="mxPrev">‹</button>'+
        '<span class="mlabel">'+MONTHS[m-1]+' '+y+'</span>'+
        '<button class="cal-nav" id="mxNext">›</button></div>';
    var grid = '<div class="cal-grid">';
    DOW.forEach(function(d){ grid += '<div class="cal-dow">'+d+'</div>'; });
    var lead = dowMon(y,m,1);
    for (var i=0;i<lead;i++) grid += '<div class="cal-day blank"></div>';
    var n = dim(y,m);
    for (var d=1; d<=n; d++){
      var iso = isoOf(y,m,d), cls="cal-day", off = iso < today;
      if (off) cls += " off";
      else {
        if (MX.start && MX.end && iso>MX.start && iso<MX.end) cls += " inrange";
        if (iso===MX.start) cls += " end1";
        if (iso===MX.end)   cls += " end2";
      }
      grid += '<div class="'+cls+'"'+(off?'':' data-day="'+iso+'"')+'>'+d+'</div>';
    }
    grid += '</div>';
    var cal = document.getElementById("mxCal"); cal.innerHTML = head+grid;
    var tm = { y:+today.slice(0,4), m:+today.slice(5,7) };
    var atFloor = (y===tm.y && m<=tm.m);
    var prev = document.getElementById("mxPrev"); if (atFloor) prev.setAttribute("disabled","");
    prev.onclick = function(){ if(atFloor) return; MX.view.m--; if(MX.view.m<1){MX.view.m=12;MX.view.y--;} renderCal(); };
    document.getElementById("mxNext").onclick = function(){ MX.view.m++; if(MX.view.m>12){MX.view.m=1;MX.view.y++;} renderCal(); };
    cal.querySelector(".cal-grid").addEventListener("click", function(e){
      var c = e.target.closest("[data-day]"); if(!c) return;
      var iso = c.getAttribute("data-day");
      if (!MX.start || (MX.start && MX.end)){ MX.start=iso; MX.end=null; }
      else if (iso < MX.start){ MX.start=iso; }
      else { MX.end=iso; }
      document.getElementById("mxStart").textContent = MX.start ? fmtIso(MX.start) : "—";
      document.getElementById("mxEnd").textContent   = MX.end ? fmtIso(MX.end) : (MX.start?fmtIso(MX.start):"—");
      renderCal(); mxUpdate();
    });
  }

  function mxUpdate(){
    var P=pickupDays(), r=nLengths(), B=nBrokers(), N=totalScrapes();
    var box = document.getElementById("mxCount");
    var missing = [];
    if (P<1) missing.push("a pickup-day range");
    if (r<1) missing.push("a rental length");
    if (B<1) missing.push("at least one broker");
    if (missing.length){
      box.className="count"; box.textContent="Pick "+missing.join(" and ")+" to see the scrape count.";
      tg.MainButton.setText(B<1 ? "PICK A BROKER" : "PICK RANGE + LENGTH"); tg.MainButton.disable(); return;
    }
    box.innerHTML =
      '<b>'+P+'</b> pickup day'+(P===1?'':'s')+' × <b>'+r+'</b> length'+(r===1?'':'s')+
      ' × <b>'+B+'</b> broker'+(B===1?'':'s')+' = <span class="big">'+N+'</span> scrapes'+
      ' <span style="color:var(--muted)">('+baseWindows()+' base · ~'+etaMin()+'min)</span>';
    if (N>CAP){
      box.className="count bad";
      box.innerHTML += '<br><b style="color:var(--premium)">Over '+CAP+' — trim the range, lengths, or brokers.</b>';
      tg.MainButton.setText("TOO BIG · "+N+"/"+CAP);
      tg.MainButton.setParams({ color:"#ef5350", text_color:"#ffffff" }); tg.MainButton.disable();
    } else {
      box.className="count ok";
      tg.MainButton.setParams({ color:"#21c45d", text_color:"#03210f" });
      tg.MainButton.setText("GO · "+N+" scrapes (~"+etaMin()+"min)"); tg.MainButton.enable();
    }
  }

  function mxGo(){
    var N=totalScrapes(); if (pickupDays()<1 || nLengths()<1 || nBrokers()<1 || N>CAP) return;
    var msg = "This = "+N+" scrapes (~"+etaMin()+"min), serial. Run it?";
    var doSend = function(){
      tg.sendData(JSON.stringify({
        v:3, t:"matrix", st:MX.station, lang:(Q.get("lang")||"en"),
        start:MX.start, end:(MX.end||MX.start), pk:MX.pk,
        lengths:Object.keys(MX.lengths).map(Number).sort(function(a,b){return a-b;}),
        groups:groupSizes().filter(function(s){return MX.grp[s];}).map(function(s){return s.toLowerCase();}),
        brokers:mxSelectedCodes()                    // FLAT selected set (primary-priority order); backend picks primary
      }));
      tg.close();
    };
    if (tg.showConfirm){ tg.showConfirm(msg, function(ok){ if(ok) doSend(); }); }
    else if (window.confirm(msg)){ doSend(); }
  }

  // ── boot ───────────────────────────────────────────────────────────────────
  tg.MainButton.setParams({ color:"#21c45d", text_color:"#03210f" });
  renderHeader();
  if (TYPE === "matrix") flowMatrix();
  else if (TYPE === "multi") flowMulti();
  else if (TYPE === "today") flowToday();
  else flowSingle();

  setInterval(function(){ document.getElementById("hdLive").textContent = "live · " + athensClock(); }, 30000);
</script>
</body>
</html>

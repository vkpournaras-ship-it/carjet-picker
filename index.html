<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>CarJet price check</title>
<!-- Telegram Mini App SDK (official, public) -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0e1621; --panel:#16202b; --panel2:#1b2733; --txt:#e9eff5; --muted:#8194a3;
    --line:#283643; --accent:#2ea6ff; --green:#21c45d; --greenbg:rgba(33,196,93,.12);
    --small:#3b9eff; --medium:#28c46a; --large:#f0a52b; --suv:#a86cf0;
    --estate:#16bfa6; --premium:#ef5350; --cabrio:#e06bb0; --van:#7a8a99;
    color-scheme:dark;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,sans-serif}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt)}
  body{padding:16px 14px 26px}

  h1{font-size:17px;margin:0 0 3px;font-weight:700;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12px;margin:0 0 14px;line-height:1.5}

  /* PDF-style header */
  .header{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:16px}
  .hd-top{font-size:10.5px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;
          display:flex;justify-content:space-between;align-items:center}
  .hd-top .stat{color:var(--green);font-weight:700}
  .hd-main{font-size:16px;font-weight:700;margin-top:5px;letter-spacing:.2px}
  .hd-sub{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.45}

  .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;
         margin:18px 2px 9px;font-weight:700}

  .row{display:flex;flex-wrap:wrap;gap:7px}
  .seg{display:flex;gap:8px}
  .seg button{flex:1}

  .chip{padding:9px 13px;border-radius:7px;border:1.5px solid var(--line);background:transparent;
        color:var(--txt);font-size:12.5px;cursor:pointer;font-weight:600;letter-spacing:.2px;
        transition:.12s;-webkit-appearance:none}
  .chip.on{color:#03121f;border-color:transparent}
  .chip[disabled]{opacity:1;cursor:default}

  /* days stepper */
  .stepper{display:flex;align-items:center;gap:10px}
  .stepper button{width:46px;height:42px;border-radius:8px;border:1.5px solid var(--line);
        background:var(--panel);color:var(--txt);font-size:22px;font-weight:700;line-height:1;cursor:pointer}
  .stepper button:disabled{opacity:.35;cursor:default}
  .stepper .val{min-width:54px;text-align:center}
  .stepper .num{font-size:22px;font-weight:700;color:var(--txt)}
  .stepper .cap{display:block;font-size:9.5px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}

  .note{padding:11px 13px;color:var(--muted);font-size:12px;border:1px dashed var(--line);
        border-radius:7px;width:100%}
</style>
</head>
<body>
  <h1>CarJet price check</h1>
  <p class="sub">Pick station, sizes and a pickup time, then tap GO.</p>

  <!-- PDF-style header card -->
  <div class="header" id="hdr">
    <div class="hd-top"><span id="hdLive">live</span><span class="stat" id="hdStat">ZTH · CarJet</span></div>
    <div class="hd-main" id="hdMain">—</div>
    <div class="hd-sub" id="hdSub">pick a pickup time + at least one size</div>
  </div>

  <div class="label">Station</div>
  <div class="seg" id="station">
    <button class="chip on" data-v="ZTH02">ZTH · Zakynthos</button>
    <button class="chip" data-v="EFL02">EFL · Kefalonia</button>
  </div>

  <div class="label">Car sizes (pick one or more)</div>
  <div class="row" id="sizes"></div>

  <div class="label">Days (consecutive pickup-days)</div>
  <div class="stepper" id="days">
    <button data-d="-1" id="dMinus">−</button>
    <div class="val"><span class="num" id="dVal">1</span><span class="cap" id="dCap">day</span></div>
    <button data-d="1" id="dPlus">+</button>
  </div>

  <div class="label">Pickup time (today)</div>
  <div class="row" id="times"></div>

  <div class="label">Brokers (optional)</div>
  <div class="row" id="brokers"></div>

<script>
  var tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  // ── colour palette per size (CSS var name) ───────────────────────────────
  var SIZES = ["Small","Medium","Large","SUV","Estate","Premium","Cabrio","Van"];
  var SIZE_VAR = {Small:"--small",Medium:"--medium",Large:"--large",SUV:"--suv",
                  Estate:"--estate",Premium:"--premium",Cabrio:"--cabrio",Van:"--van"};
  // Optional brokers (CarJet is the always-on base = the matrix scrape itself, never sent).
  var BROKERS = [{code:"dc",label:"Discover"},{code:"ct",label:"CTrawler"},{code:"rc",label:"RentalCars"}];
  var STAT = {ZTH02:"ZTH · CarJet", EFL02:"EFL · rentalcars"};

  var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var DAY_MIN = 1, DAY_MAX = 14;

  var sel = {};                 // selected sizes (name -> true)
  var brk = {};                 // selected optional broker codes (code -> true)
  var station = "ZTH02", days = 1, pickup = null;

  function pad2(n){ return (n<10?"0":"")+n; }

  // ── dates in Europe/Athens (avoids UTC rollover) ─────────────────────────
  function athensYMD(){
    var p = new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/Athens",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date());
    var o={}; p.forEach(function(x){o[x.type]=x.value;});
    return {y:+o.year,m:+o.month,d:+o.day};
  }
  function fmt(dt){ return pad2(dt.getUTCDate())+" "+MONTHS[dt.getUTCMonth()]; }
  function athensHour(){
    var s = new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/Athens",hour:"2-digit",hour12:false}).format(new Date());
    var h = parseInt(s,10); if (h===24) h=0; return h;
  }
  function athensClock(){
    return new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/Athens",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date());
  }

  // ── STATION (single-select) ──────────────────────────────────────────────
  var stationBox = document.getElementById("station");
  stationBox.addEventListener("click", function(e){
    var b = e.target.closest("button"); if(!b) return;
    [].forEach.call(stationBox.querySelectorAll("button"), function(x){ x.classList.remove("on"); });
    b.classList.add("on"); station = b.getAttribute("data-v"); update();
  });

  // ── CAR SIZES (multi-select, fill stays) ─────────────────────────────────
  var sizesBox = document.getElementById("sizes");
  SIZES.forEach(function(s){
    var b = document.createElement("button");
    b.className = "chip"; b.textContent = s;
    b.addEventListener("click", function(){
      if (sel[s]) { delete sel[s]; b.classList.remove("on"); b.style.background = ""; }
      else { sel[s] = true; b.classList.add("on"); b.style.background = "var("+SIZE_VAR[s]+")"; }
      update();
    });
    sizesBox.appendChild(b);
  });

  // ── DAYS (stepper) ───────────────────────────────────────────────────────
  var dVal = document.getElementById("dVal"), dCap = document.getElementById("dCap");
  var dMinus = document.getElementById("dMinus"), dPlus = document.getElementById("dPlus");
  function renderDays(){
    dVal.textContent = days;
    dCap.textContent = days === 1 ? "day" : "days";
    dMinus.disabled = days <= DAY_MIN;
    dPlus.disabled  = days >= DAY_MAX;
  }
  document.getElementById("days").addEventListener("click", function(e){
    var b = e.target.closest("button"); if(!b || b.disabled) return;
    days = Math.min(DAY_MAX, Math.max(DAY_MIN, days + parseInt(b.getAttribute("data-d"),10)));
    renderDays(); update();
  });

  // ── PICKUP TIME (single-select, today only) ──────────────────────────────
  var timesBox = document.getElementById("times");
  (function buildTimes(){
    var nextHour = athensHour() + 1;
    if (nextHour > 23) {
      var note = document.createElement("div");
      note.className = "note"; note.textContent = "No pickup times left today — try again tomorrow.";
      timesBox.appendChild(note); return;
    }
    for (var h = nextHour; h <= 23; h++){
      var b = document.createElement("button");
      b.className = "chip"; b.setAttribute("data-v", pad2(h)+":00"); b.textContent = pad2(h)+":00";
      timesBox.appendChild(b);
    }
    timesBox.addEventListener("click", function(e){
      var t = e.target.closest("button"); if(!t) return;
      [].forEach.call(timesBox.querySelectorAll("button"), function(x){ x.classList.remove("on"); x.style.background=""; });
      t.classList.add("on"); t.style.background = "var(--accent)";
      pickup = t.getAttribute("data-v"); update();
    });
  })();

  // ── BROKERS (CarJet base always-on + optional multi-select) ──────────────
  var brokersBox = document.getElementById("brokers");
  (function buildBrokers(){
    var base = document.createElement("button");
    base.className = "chip on"; base.textContent = "CarJet"; base.disabled = true;
    base.style.background = "var(--accent)"; base.title = "base — always included";
    brokersBox.appendChild(base);
    BROKERS.forEach(function(b){
      var btn = document.createElement("button");
      btn.className = "chip"; btn.textContent = b.label;
      btn.addEventListener("click", function(){
        if (brk[b.code]) { delete brk[b.code]; btn.classList.remove("on"); btn.style.background=""; }
        else { brk[b.code] = true; btn.classList.add("on"); btn.style.background = "var(--accent)"; }
        update();
      });
      brokersBox.appendChild(btn);
    });
  })();

  // ── header + GO state ────────────────────────────────────────────────────
  function update(){
    document.getElementById("hdStat").textContent = STAT[station] || STAT.ZTH02;
    document.getElementById("hdLive").textContent = "live · " + athensClock();

    // window: check-in = today (Athens), check-out = +7d (all rentals are 7 days)
    var t = athensYMD();
    var ci = new Date(Date.UTC(t.y, t.m-1, t.d));
    var co = new Date(Date.UTC(t.y, t.m-1, t.d + 7));
    document.getElementById("hdMain").textContent = station.slice(0,3) + "  " + fmt(ci) + " → " + fmt(co) + "  ·  7 days";

    var sizes = Object.keys(sel);
    var n = sizes.length;
    var brokers = BROKERS.filter(function(b){ return brk[b.code]; }).map(function(b){ return b.label; });

    var sub;
    if (!pickup)      sub = "pick a pickup time";
    else if (!n)      sub = "pickup " + pickup + " · pick at least one size";
    else {
      sub = "pickup " + pickup + " · " + days + (days===1?" day":" days") + " · " + n + (n===1?" size":" sizes");
      if (brokers.length) sub += " · + " + brokers.join(", ");
    }
    document.getElementById("hdSub").textContent = sub;

    if (!pickup)      { tg.MainButton.setText("PICK A PICKUP TIME"); tg.MainButton.disable(); }
    else if (!n)      { tg.MainButton.setText("PICK AT LEAST ONE SIZE"); tg.MainButton.disable(); }
    else {
      tg.MainButton.setText("GO · " + n + (n===1?" size":" sizes") + " · " + days + "d · " + pickup);
      tg.MainButton.enable();
    }
  }

  tg.MainButton.setParams({ color:"#21c45d", text_color:"#03210f" });
  tg.MainButton.show();
  tg.MainButton.onClick(function(){
    var sizes = Object.keys(sel);
    if (!sizes.length || !pickup) return;
    var brokers = BROKERS.filter(function(b){ return brk[b.code]; }).map(function(b){ return b.code; });
    tg.sendData(JSON.stringify({ v:1, station:station, sizes:sizes, days:days, pickup:pickup, brokers:brokers }));
    tg.close();
  });

  renderDays();
  update();
  // keep the header clock fresh while the panel is open
  setInterval(function(){ document.getElementById("hdLive").textContent = "live · " + athensClock(); }, 30000);
</script>
</body>
</html>
